<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Clinic Settings (Showcase)</title>
    <link rel="stylesheet" href="../medical_clinic/static/css/output.css">
    <link rel="stylesheet" href="../medical_clinic/static/css/custom.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="container mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 font-extrabold text-slate-900">
                <i class="fas fa-location-dot text-red-500"></i>
                Clinic Settings
            </a>
            <a href="index.html" class="px-4 py-2 rounded-xl bg-white border border-slate-200 font-bold hover:bg-slate-50">Back</a>
        </div>
    </header>

    <main class="grow">
        <div class="container mx-auto px-4 md:px-6 py-10">
            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                <h1 class="text-2xl font-extrabold">Footer Address + Google Maps (UI Showcase)</h1>
                <p class="text-slate-600 mt-2">Shows the form fields used to set address/hours and map query/embed.</p>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl shadow-sm mt-6 p-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-extrabold text-slate-700 mb-2">Address</label>
                        <textarea class="w-full rounded-xl border border-slate-200 px-4 py-3" rows="4">123 Health Avenue, Downtown
Your City, Your State 000000</textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-extrabold text-slate-700 mb-2">Hours</label>
                        <textarea class="w-full rounded-xl border border-slate-200 px-4 py-3" rows="4">Mon–Sat: 9:00 AM – 6:00 PM
Sun: Emergency only</textarea>
                    </div>
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-extrabold text-slate-700 mb-2">Google Maps Query</label>
                        <input class="w-full rounded-xl border border-slate-200 px-4 py-3" value="123 Health Avenue, Downtown" />
                        <p class="text-sm text-slate-500 mt-2">Admin can copy an address from Google Maps and paste here.</p>
                    </div>
                </div>

                <div class="mt-6 flex flex-col sm:flex-row gap-3">
                    <button class="px-6 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700">Save (UI)</button>
                    <a href="../index.html#contact" class="px-6 py-3 rounded-xl bg-white border border-slate-200 text-slate-900 font-bold hover:bg-slate-50 text-center">View Footer</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-300 py-8">
        <div class="container mx-auto px-4 md:px-6 text-sm">
            <p>This is a static UI mock. Real saving works only on the deployed Django app.</p>
        </div>
    </footer>
</body>

</html>
